<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions -->
  <defs>
    <!-- Emerald ring gradient -->
    <linearGradient id="ringGradient" x1="20" y1="20" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#008A77"/>
      <stop offset="50%" stop-color="#006054"/>
      <stop offset="100%" stop-color="#00453C"/>
    </linearGradient>

    <!-- Inner soft green background -->
    <radialGradient id="innerGlow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#EAF4EF"/>
      <stop offset="100%" stop-color="#DCEBE3"/>
    </radialGradient>

    <!-- Subtle shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Inner soft background circle -->
  <circle cx="100" cy="100" r="70" fill="url(#innerGlow)"/>

  <!-- Emerald ring -->
  <circle 
    cx="100" 
    cy="100" 
    r="80" 
    stroke="url(#ringGradient)" 
    stroke-width="12"
    filter="url(#softShadow)"
  />

  <!-- Chat bubble -->
  <path 
    d="M72 78 
       H128 
       Q138 78 138 88 
       V110 
       Q138 120 128 120 
       H108 
       L94 134 
       V120 
       H72 
       Q62 120 62 110 
       V88 
       Q62 78 72 78 
       Z" 
    stroke="#00453C" 
    stroke-width="7" 
    fill="none" 
    stroke-linecap="round"
    stroke-linejoin="round"
  />

</svg>
